<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="styles-v2.css">
</head>
<body>

    <!-- Header Section -->
    <header class="fade-in">
        <h1 class="slide-left">Welcome to My Portfolio</h1>
        <p class="slide-right">I'm a front-end developer passionate about web design.</p>
    </header>

    <!-- Projects Section -->
    <section class="fade-in">
        <h2 class="slide-left">My Projects</h2>
        
        <div class="project-card hover-zoom">
            <img src="project1.jpg" alt="Project 1">
            <h3>Project 1</h3>
            <p>A cool web app I built.</p>
        </div>

        <div class="project-card hover-zoom">
            <img src="project2.jpg" alt="Project 2">
            <h3>Project 2</h3>
            <p>Another awesome project.</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="fade-in">
        <h2 class="slide-left">Contact Me</h2>
        <button class="hover-zoom">Get in Touch</button>
    </section>

</body>
</html>
